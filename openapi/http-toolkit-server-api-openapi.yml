openapi: 3.0.3
info:
  title: HTTP Toolkit Server API
  description: >
    The backend REST API exposed by the HTTP Toolkit server, used to start
    and manage the local HTTP/HTTPS proxy, launch intercepted applications,
    manage interception rules, handle certificate operations, and send requests
    through the proxy. The server listens on localhost (default port 45456)
    and uses token-based authentication via the Authorization header.
  version: 1.0.0
  contact:
    name: HTTP Toolkit
    url: https://httptoolkit.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://localhost:45456
    description: Local HTTP Toolkit server (default port)
security:
  - bearerAuth: []
tags:
  - name: server
    description: Server lifecycle and version management
  - name: config
    description: Proxy configuration and network settings
  - name: interceptors
    description: Interceptor management for various environments and applications
  - name: client
    description: HTTP client request sending through the proxy
paths:
  /version:
    get:
      summary: Get server version
      description: Returns the current version of the HTTP Toolkit server.
      operationId: getVersion
      tags:
        - server
      responses:
        '200':
          description: Server version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
              example:
                version: "1.3.2"
  /update:
    post:
      summary: Trigger server update
      description: Initiates a server self-update process.
      operationId: updateServer
      tags:
        - server
      responses:
        '200':
          description: Update triggered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
  /shutdown:
    post:
      summary: Shutdown the server
      description: Shuts down the HTTP Toolkit server process.
      operationId: shutdownServer
      tags:
        - server
      responses:
        '200':
          description: Shutdown initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
  /config:
    get:
      summary: Get proxy configuration
      description: >
        Returns the current proxy configuration including certificate details,
        system proxy settings, DNS servers, and rule parameter keys.
      operationId: getConfig
      tags:
        - config
      parameters:
        - $ref: '#/components/parameters/ProxyPort'
      responses:
        '200':
          description: Current proxy configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
  /config/network-interfaces:
    get:
      summary: Get network interfaces
      description: Returns all available network interfaces on the host machine.
      operationId: getNetworkInterfaces
      tags:
        - config
      responses:
        '200':
          description: List of network interfaces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkInterfacesResponse'
  /interceptors:
    get:
      summary: List interceptors
      description: >
        Returns top-level state of all available interceptors, including
        whether each is activable and currently active. Supports Docker,
        Android, Python, Ruby, Java, Electron, and JavaScript environments.
      operationId: getInterceptors
      tags:
        - interceptors
      parameters:
        - $ref: '#/components/parameters/ProxyPort'
      responses:
        '200':
          description: List of interceptors with state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterceptorsResponse'
  /interceptors/{id}/metadata:
    get:
      summary: Get detailed interceptor metadata
      description: >
        Returns the complete detailed metadata for a specific interceptor,
        including all available targets and full configuration details beyond
        what is returned by the list endpoint.
      operationId: getInterceptorMetadata
      tags:
        - interceptors
      parameters:
        - $ref: '#/components/parameters/InterceptorId'
      responses:
        '200':
          description: Detailed interceptor metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterceptorMetadataResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /interceptors/{id}/metadata/{subId}:
    get:
      summary: Get sub-interceptor metadata
      description: >
        Returns even more detailed metadata about a specific sub-target
        within a multi-target interceptor (e.g., a specific browser profile
        or Android device).
      operationId: getInterceptorSubMetadata
      tags:
        - interceptors
      parameters:
        - $ref: '#/components/parameters/InterceptorId'
        - name: subId
          in: path
          required: true
          description: Sub-identifier for a specific target within the interceptor
          schema:
            type: string
      responses:
        '200':
          description: Sub-interceptor metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterceptorMetadataResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /interceptors/{id}/activate/{proxyPort}:
    post:
      summary: Activate an interceptor
      description: >
        Activates a specific interceptor for the given proxy port, injecting
        the proxy configuration into the target application or environment.
        The result may include success:false for non-critical failures (e.g.,
        Chrome prompt-to-quit scenarios) without throwing an error.
      operationId: activateInterceptor
      tags:
        - interceptors
      parameters:
        - $ref: '#/components/parameters/InterceptorId'
        - name: proxyPort
          in: path
          required: true
          description: Port number that the proxy is listening on
          schema:
            type: integer
            minimum: 1
            maximum: 65535
      requestBody:
        description: Optional interceptor-specific activation options
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Interceptor-specific activation options (varies by interceptor)
      responses:
        '200':
          description: Activation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /client/send:
    post:
      summary: Send an HTTP request
      description: >
        Sends an HTTP request through the proxy and streams back the response
        as newline-delimited JSON (NDJSON). The response stream emits typed
        events including response-start, response-body-part, and response-end.
        Request and response body data is base64-encoded.
      operationId: sendRequest
      tags:
        - client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendRequestBody'
      responses:
        '200':
          description: >
            NDJSON stream of response events. Each line is a JSON object with
            a `type` field indicating the event type.
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/ResponseStreamEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Token-based authentication using a server-generated bearer token
  parameters:
    ProxyPort:
      name: proxyPort
      in: query
      required: false
      description: >
        The port number the Mockttp proxy is listening on. Optional — omit to
        query data before the proxy has started for potentially faster setup.
      schema:
        type: integer
        minimum: 1
        maximum: 65535
    InterceptorId:
      name: id
      in: path
      required: true
      description: Unique identifier of the interceptor
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request — missing or invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    VersionResponse:
      type: object
      required:
        - version
      properties:
        version:
          type: string
          description: Semantic version string of the HTTP Toolkit server
          example: "1.3.2"
    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
          example: true
    ConfigResponse:
      type: object
      required:
        - config
      properties:
        config:
          $ref: '#/components/schemas/ProxyConfig'
    ProxyConfig:
      type: object
      required:
        - certificatePath
        - certificateContent
        - certificateFingerprint
      properties:
        certificatePath:
          type: string
          description: Filesystem path to the CA certificate used for HTTPS interception
          example: "/home/user/.config/httptoolkit/ca.pem"
        certificateContent:
          type: string
          description: PEM-encoded CA certificate content
        certificateFingerprint:
          type: string
          description: SHA-256 fingerprint of the CA certificate
          example: "sha256/abc123..."
        systemProxy:
          $ref: '#/components/schemas/SystemProxy'
        ruleParameterKeys:
          type: array
          items:
            type: string
          description: Keys of currently configured rule parameters
    SystemProxy:
      type: object
      required:
        - proxyUrl
      properties:
        proxyUrl:
          type: string
          format: uri
          description: URL of the system proxy
          example: "http://proxy.example.com:8080"
        noProxy:
          type: array
          items:
            type: string
          description: Hosts that should bypass the proxy
          example: ["localhost", "127.0.0.1"]
    NetworkInterfacesResponse:
      type: object
      required:
        - networkInterfaces
      properties:
        networkInterfaces:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/NetworkInterface'
          description: Map of interface name to list of address entries
    NetworkInterface:
      type: object
      properties:
        address:
          type: string
          description: IP address of the interface
          example: "192.168.1.100"
        netmask:
          type: string
          description: Subnet mask
          example: "255.255.255.0"
        family:
          type: string
          enum: [IPv4, IPv6]
          description: Address family
        mac:
          type: string
          description: MAC address
          example: "00:1a:2b:3c:4d:5e"
        internal:
          type: boolean
          description: Whether this is a loopback interface
        cidr:
          type: string
          description: CIDR notation for the address
          example: "192.168.1.100/24"
    InterceptorsResponse:
      type: object
      required:
        - interceptors
      properties:
        interceptors:
          type: array
          items:
            $ref: '#/components/schemas/Interceptor'
    Interceptor:
      type: object
      required:
        - id
        - version
        - isActivable
        - isActive
      properties:
        id:
          type: string
          description: Unique identifier of the interceptor
          example: "fresh-chrome"
        version:
          type: string
          description: Version of the interceptor
          example: "1.0.0"
        isActivable:
          type: boolean
          description: Whether this interceptor can be activated on this system
        isActive:
          type: boolean
          description: Whether this interceptor is currently active
        metadata:
          type: object
          additionalProperties: true
          description: Summary metadata specific to this interceptor type
    InterceptorMetadataResponse:
      type: object
      required:
        - interceptorMetadata
      properties:
        interceptorMetadata:
          type: object
          additionalProperties: true
          description: Detailed metadata for the interceptor, structure varies by interceptor type
    ActivationResponse:
      type: object
      required:
        - result
      properties:
        result:
          type: object
          additionalProperties: true
          description: >
            Activation result. May contain success:false for non-critical
            failures (e.g., Chrome confirmation dialogs) without an HTTP error.
    SendRequestBody:
      type: object
      required:
        - request
        - options
      properties:
        request:
          $ref: '#/components/schemas/RequestDefinition'
        options:
          $ref: '#/components/schemas/RequestOptions'
    RequestDefinition:
      type: object
      required:
        - method
        - url
      properties:
        method:
          type: string
          description: HTTP method
          example: "GET"
        url:
          type: string
          format: uri
          description: Target URL
          example: "https://example.com/api/data"
        headers:
          type: object
          additionalProperties:
            type: string
          description: Request headers
        rawBody:
          type: string
          format: byte
          description: Base64-encoded request body
    RequestOptions:
      type: object
      properties:
        trustAdditionalCAs:
          type: boolean
          description: Whether to trust additional CA certificates beyond system defaults
        clientCertificate:
          $ref: '#/components/schemas/ClientCertificate'
        proxyConfig:
          type: object
          additionalProperties: true
          description: Proxy configuration overrides for this specific request
    ClientCertificate:
      type: object
      required:
        - pfx
      properties:
        pfx:
          type: string
          format: byte
          description: Base64-encoded PKCS#12 client certificate bundle
        passphrase:
          type: string
          description: Passphrase for the PKCS#12 bundle
    ResponseStreamEvent:
      type: object
      required:
        - type
        - timestamp
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
          enum:
            - response-start
            - response-body-part
            - response-end
            - error
          description: Type of stream event
        timestamp:
          type: number
          description: Performance timestamp when this event occurred
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
