name: HTTP Toolkit
description: HTTP Toolkit is a beautiful, cross-platform, and open-source tool for
  debugging, testing, and building with HTTP(S) on Windows, Linux, and Mac. It provides
  a REST API for intercepting HTTP/HTTPS traffic, inspecting requests and responses,
  automated mocking and rewriting of API traffic, and integrations with Docker, Android,
  Python, Ruby, Java, Electron, and JavaScript development workflows.
