vocabulary:
  title: HTTP Toolkit Vocabulary
  description: >
    Domain vocabulary for HTTP Toolkit — a cross-platform, open-source tool for
    debugging, testing, and building with HTTP(S). Terms cover the proxy lifecycle,
    traffic interception, request/response management, and certificate handling.
  version: 1.0.0
  source: https://httptoolkit.com/docs/
  terms:
    - term: interceptor
      label: Interceptor
      definition: >
        A pluggable module that injects the HTTP Toolkit proxy configuration into
        a specific application or environment (e.g., Chrome, Firefox, Android,
        Docker containers, Node.js processes, Python, Ruby, Java, Electron).
        Each interceptor has a unique ID and exposes isActivable/isActive state.
      relatedTerms:
        - proxy
        - proxyPort
        - activation
    - term: proxyPort
      label: Proxy Port
      definition: >
        The TCP port number on localhost that the Mockttp proxy process is
        listening on. Client applications are redirected to this port for
        traffic capture. Default is typically 8000.
      relatedTerms:
        - interceptor
        - proxy
    - term: proxy
      label: Proxy
      definition: >
        The local HTTP/HTTPS proxy process (powered by Mockttp) that intercepts,
        inspects, and optionally rewrites or mocks network traffic from
        instrumented client applications.
      relatedTerms:
        - interceptor
        - proxyPort
        - mockttp
    - term: mockttp
      label: Mockttp
      definition: >
        The underlying Node.js HTTP/HTTPS proxy and mock server library used
        by HTTP Toolkit to capture and manipulate traffic. Provides programmatic
        rule-based request matching and response generation.
      relatedTerms:
        - proxy
    - term: certificatePath
      label: Certificate Path
      definition: >
        The filesystem path to the PEM-encoded CA (Certificate Authority)
        certificate generated by HTTP Toolkit. This certificate must be trusted
        by client applications (or installed in the OS trust store) to enable
        HTTPS interception without TLS errors.
      relatedTerms:
        - certificateContent
        - certificateFingerprint
        - httpsInterception
    - term: certificateContent
      label: Certificate Content
      definition: >
        The PEM-encoded text content of the HTTP Toolkit CA certificate.
        Applications can use this programmatically to configure trust without
        reading from disk.
      relatedTerms:
        - certificatePath
    - term: certificateFingerprint
      label: Certificate Fingerprint
      definition: >
        A SHA-256 hash of the CA certificate used for certificate pinning and
        verification. Allows clients to confirm they are connected to the
        expected HTTP Toolkit instance.
      relatedTerms:
        - certificatePath
    - term: httpsInterception
      label: HTTPS Interception
      definition: >
        The process of decrypting and re-encrypting HTTPS traffic using a
        locally-generated CA certificate. HTTP Toolkit performs a MITM
        (man-in-the-middle) interception for debugging purposes on the local machine.
      relatedTerms:
        - certificatePath
        - proxy
    - term: activation
      label: Interceptor Activation
      definition: >
        The process of enabling an interceptor, which configures a specific
        application or environment to route its HTTP(S) traffic through the
        HTTP Toolkit proxy. For browsers this launches a new profiled instance;
        for devices it pushes proxy configuration via ADB or MDM.
      relatedTerms:
        - interceptor
        - proxyPort
    - term: rawBody
      label: Raw Body
      definition: >
        The byte content of an HTTP request or response body, base64-encoded
        when transmitted through the HTTP Toolkit Server API to ensure safe
        transport of binary data.
      relatedTerms:
        - requestDefinition
    - term: ruleParameterKeys
      label: Rule Parameter Keys
      definition: >
        The set of named parameter keys that have been configured in the HTTP
        Toolkit UI for use in traffic matching and rewriting rules. Rules can
        reference these parameters by key to create dynamic, reusable behavior.
      relatedTerms:
        - mockttp
    - term: ndjson
      label: Newline-Delimited JSON (NDJSON)
      definition: >
        The streaming format used by the /client/send endpoint. Each line of
        the response body is a complete, self-contained JSON object representing
        one event in the response stream (response-start, response-body-part,
        response-end, or error).
      relatedTerms:
        - responseStreamEvent
    - term: responseStreamEvent
      label: Response Stream Event
      definition: >
        A single JSON object in the NDJSON stream returned by /client/send.
        Contains a `type` field (response-start, response-body-part, response-end,
        error) and a `timestamp` field, plus type-specific fields such as
        statusCode, headers, or rawBody.
      relatedTerms:
        - ndjson
    - term: bearerToken
      label: Bearer Token
      definition: >
        The authentication credential used to authorize requests to the HTTP
        Toolkit server API. The token is generated at server startup and must
        be included in the Authorization header of all API requests.
      relatedTerms:
        - proxy
    - term: networkInterfaces
      label: Network Interfaces
      definition: >
        A map of the host machine's network interface names to their associated
        IP address entries (IPv4 and IPv6), used to configure interceptor
        network bindings and proxy discovery by client devices.
